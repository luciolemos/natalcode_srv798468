name: Visual Regression

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: visual-regression-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: test
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Create test env file
        run: |
          cat <<'EOF' > .env
          APP_ENV=test
          EOF

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright + OS deps
        timeout-minutes: 8
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          npx playwright install --with-deps chromium || {
            echo "First Playwright install attempt failed; retrying in 15 seconds..."
            sleep 15
            npx playwright install --with-deps chromium
          }

      - name: Run visual regression tests
        env:
          PW_TEST_SCREENSHOT_NO_FONTS_READY: "1"
          FONTCONFIG_PATH: /etc/fonts
        run: npm run test:visual

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
