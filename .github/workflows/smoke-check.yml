name: Smoke Check

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare script
        run: chmod +x scripts/smoke-check.sh

      - name: Run smoke check (natalcode)
        run: ./scripts/smoke-check.sh https://natalcode.com.br/
