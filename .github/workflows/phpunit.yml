name: PHPUnit

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      XDEBUG_MODE: off
      MIN_STATEMENT_COVERAGE: "5"
      NEXT_MIN_STATEMENT_COVERAGE: "10"
      COVERAGE_CRITICAL_PATH_TARGETS: "src/Application/Middleware=15,src/Application/Security=20,src/Application/Actions/Page/ContactPageAction.php=20"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-phpunit-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-phpunit-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit with coverage
        run: |
          mkdir -p build/logs
          vendor/bin/phpunit --configuration phpunit.xml --coverage-clover build/logs/clover.xml

      - name: Enforce coverage gate
        run: |
          php scripts/check_coverage_gate.php \
            build/logs/clover.xml \
            "$MIN_STATEMENT_COVERAGE" \
            "$NEXT_MIN_STATEMENT_COVERAGE" \
            "$COVERAGE_CRITICAL_PATH_TARGETS"
